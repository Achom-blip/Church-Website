<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Christ Summit Ministries</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <a href="index.html" class="logo">Christ <span class="span"><br> Summit Ministries</span></a>

        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="sermons.html">Sermons</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="contact-hero">
        <h1>Get In Touch</h1>
        <p>We would love to hear from you ❤️</p>
    </section>

    <!-- CONTACT SECTION -->
    <section class="contact-container">

        <!-- LEFT (FORM) -->
        <div class="contact-form">
            <h2>Send Us a Message</h2>

            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="5" placeholder="Your Message"></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>

        <!-- RIGHT (INFO) -->
        <div class="contact-info">
            <h2>Contact Info</h2>

            <p><i class="fas fa-phone"></i> +254 721 662927</p>
            <p><i class="fas fa-envelope"></i> christsummitministries@gmail.com</p>
            <p><i class="fas fa-location-dot"></i> Busia, Kenya</p>

            <!-- WhatsApp -->
            <a href="https://wa.me/254721662927" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> Chat on WhatsApp
            </a>
        </div>

    </section>

    <!-- GOOGLE MAP -->
    <section class="map">
        <iframe 
            src="https://maps.google.com/maps?q=Busia&t=&z=13&ie=UTF8&iwloc=&output=embed"
            width="100%" height="400" style="border:0;" allowfullscreen="">
        </iframe>
    </section>

</body>

<footer class="footer">
    <p> @ Christ Summit Ministries | All Rights Reserved. </p>
</footer>
    <script src="script.js"></script>
</html>
